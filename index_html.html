<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モダンToDoリスト</title>
    <!-- Google Fonts の読み込み（Inter & 筑紫ゴシック的な美しいフォントファミリー） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSSカスタムプロパティによるテーマ設計 */
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #e0e7ff;
            --border-color: #e2e8f0;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --success-color: #10b981;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-speed: 0.2s;
        }

        /* ダークモード用の配色 */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: #312e81;
            --border-color: #334155;
            --danger-color: #f87171;
            --danger-hover: #ef4444;
            --success-color: #34d399;
        }

        /* 基本設定リセット */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* アプリ全体のコンテナ */
        .app-container {
            width: 100%;
            max-width: 540px;
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 2rem;
            border: 1px solid var(--border-color);
            transition: background-color var(--transition-speed) ease, border-color var(--transition-speed) ease;
        }

        /* ヘッダーデザイン */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, var(--accent-color), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* テーマ切り替えトグルスイッチ */
        .theme-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            outline: none;
        }

        .theme-toggle-btn:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .theme-toggle-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 統計パネル */
        .stats-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all var(--transition-speed) ease;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* タスク入力フォーム */
        .todo-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            position: relative;
            flex-grow: 1;
        }

        .todo-input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
        }

        .todo-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .todo-submit-btn {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 0 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            transition: background-color var(--transition-speed) ease;
        }

        .todo-submit-btn:hover {
            background-color: var(--accent-hover);
        }

        /* フィルタータブ */
        .filter-tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .filter-tab {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-speed) ease;
        }

        .filter-tab:hover {
            color: var(--text-primary);
            background-color: var(--bg-primary);
        }

        .filter-tab.active {
            color: var(--accent-color);
            background-color: var(--accent-light);
            font-weight: 600;
        }

        /* タスクリスト表示部分 */
        .todo-list-container {
            max-height: 400px;
            overflow-y: auto;
            margin-right: -0.5rem;
            padding-right: 0.5rem;
        }

        /* スクロールバーのデザイン */
        .todo-list-container::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .todo-list-container::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            gap: 0.75rem;
            transition: all var(--transition-speed) ease;
            animation: fadeIn 0.3s ease;
        }

        .todo-item:hover {
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* カスタムチェックボックス */
        .checkbox-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .todo-checkbox {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 22px;
            width: 22px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: inline-block;
            position: relative;
            transition: all var(--transition-speed) ease;
            flex-shrink: 0;
        }

        .checkbox-wrapper:hover .todo-checkbox ~ .checkmark {
            border-color: var(--accent-color);
        }

        .checkbox-wrapper .todo-checkbox:checked ~ .checkmark {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-wrapper .todo-checkbox:checked ~ .checkmark:after {
            display: block;
        }

        /* タスクのテキスト */
        .todo-content {
            flex-grow: 1;
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.4;
            word-break: break-all;
            transition: all var(--transition-speed) ease;
            padding: 0 0.25rem;
        }

        .todo-item.completed .todo-content {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* アクションボタン群 */
        .action-buttons {
            display: flex;
            gap: 0.25rem;
            opacity: 0.8;
            transition: opacity var(--transition-speed) ease;
        }

        .todo-item:hover .action-buttons {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-speed) ease;
        }

        .edit-btn {
            color: var(--text-secondary);
        }

        .edit-btn:hover {
            background-color: var(--bg-primary);
            color: var(--accent-color);
        }

        .delete-btn {
            color: var(--text-muted);
        }

        .delete-btn:hover {
            background-color: #fee2e2;
            color: var(--danger-color);
        }

        /* 空状態のメッセージ表示 */
        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* インライン編集モード */
        .edit-input {
            width: 100%;
            padding: 0.375rem 0.5rem;
            font-size: 0.95rem;
            border-radius: var(--radius-sm);
            border: 2px solid var(--accent-color);
            background-color: var(--bg-card);
            color: var(--text-primary);
            outline: none;
        }

        /* レスポンシブ調整 */
        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }

            .app-container {
                padding: 1.25rem;
                border-radius: var(--radius-md);
            }

            .app-header {
                margin-bottom: 1.5rem;
            }

            .stats-panel {
                gap: 0.75rem;
                margin-bottom: 1.5rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .todo-input {
                padding: 0.75rem;
                font-size: 0.95rem;
            }

            .todo-submit-btn {
                padding: 0 1rem;
            }

            .todo-item {
                padding: 0.75rem;
            }

            .action-buttons {
                opacity: 1; /* スマホではホバーが無いため、ボタンは常時100%表示 */
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- アプリのヘッダー -->
        <header class="app-header">
            <h1 class="app-title">モダンToDoリスト</h1>
            <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="テーマの切り替え" title="ダークモード/ライトモードを切り替え">
                <!-- 太陽・月のアイコン切り替え用SVG -->
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <!-- JavaScriptでパスを書き換えます -->
                </svg>
            </button>
        </header>

        <!-- 統計情報の表示パネル -->
        <section class="stats-panel" aria-label="タスクの進行状況">
            <div class="stat-card">
                <div id="totalCount" class="stat-value">0</div>
                <div class="stat-label">すべてのタスク</div>
            </div>
            <div class="stat-card">
                <div id="completedCount" class="stat-value">0</div>
                <div class="stat-label">完了したタスク</div>
            </div>
        </section>

        <!-- タスク追加用フォーム -->
        <form id="todoForm" class="todo-form">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="新しいタスクを入力..." 
                    maxlength="100" 
                    required 
                    autocomplete="off"
                >
            </div>
            <button type="submit" class="todo-submit-btn" aria-label="タスクを追加">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>追加</span>
            </button>
        </form>

        <!-- フィルター用タブメニュー -->
        <nav class="filter-tabs" aria-label="タスクのフィルター">
            <button class="filter-tab active" data-filter="all">すべて</button>
            <button class="filter-tab" data-filter="active">未完了</button>
            <button class="filter-tab" data-filter="completed">完了済み</button>
        </nav>

        <!-- タスク一覧表示領域 -->
        <main class="todo-list-container">
            <ul id="todoList" class="todo-list">
                <!-- JavaScriptによりタスクが動的に追加されます -->
            </ul>
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📝</div>
                <p id="emptyText" class="empty-text">タスクは登録されていません</p>
            </div>
        </main>
    </div>

    <script>
        // --- 状態管理 (State) ---
        let todos = [];
        let currentFilter = 'all';
        let isDarkMode = false;

        // --- DOM要素の参照取得 ---
        const todoForm = document.getElementById('todoForm');
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');
        const totalCountEl = document.getElementById('totalCount');
        const completedCountEl = document.getElementById('completedCount');
        const filterTabs = document.querySelectorAll('.filter-tab');
        const emptyState = document.getElementById('emptyState');
        const emptyText = document.getElementById('emptyText');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');

        // SVGパスの定義（アイコン切替用）
        const sunPath = `<path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path><path d="M3 12h1M20 12h1M12 3v1M12 20v1M5.6 5.6l.7.7M17.7 17.7l.7.7M18.4 5.6l-.7.7M6.3 17.7l-.7.7"></path>`;
        const moonPath = `<path d="M12 3c.132 0 .263 0 .393.007a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"></path>`;

        // --- 初期化処理 ---
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadTodos();
            setupEventListeners();
            render();
        });

        // --- イベントリスナー設定 ---
        function setupEventListeners() {
            // タスク追加
            todoForm.addEventListener('submit', (e) => {
                e.preventDefault();
                addTodo();
            });

            // フィルター切り替え
            filterTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    filterTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.getAttribute('data-filter');
                    render();
                });
            });

            // テーマ切り替え
            themeToggleBtn.addEventListener('click', toggleTheme);
        }

        // --- ローカルストレージ連動 ---
        function loadTodos() {
            const savedTodos = localStorage.getItem('todos');
            if (savedTodos) {
                try {
                    todos = JSON.parse(savedTodos);
                } catch (error) {
                    console.error('データの読み込みに失敗しました。', error);
                    todos = [];
                }
            }
        }

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // --- テーマ（ダーク/ライト）管理 ---
        function loadTheme() {
            // システム設定または保存された設定を読み込む
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                setDarkTheme(true);
            } else {
                setDarkTheme(false);
            }
        }

        function setDarkTheme(dark) {
            isDarkMode = dark;
            if (dark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.innerHTML = sunPath; // 月から太陽へ
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.innerHTML = moonPath; // 太陽から月へ
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleTheme() {
            setDarkTheme(!isDarkMode);
        }

        // --- アプリケーションロジック ---

        // タスク追加
        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) return;

            const newTodo = {
                id: Date.now().toString(),
                text: text,
                completed: false,
                createdAt: new Date().toISOString()
            };

            todos.unshift(newTodo); // 新しいものを先頭に追加
            saveTodos();
            todoInput.value = '';
            todoInput.focus();
            render();
        }

        // タスク完了状態のトグル
        function toggleTodo(id) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            saveTodos();
            render();
        }

        // タスクの編集
        function startEdit(id, contentEl, itemEl) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            // 既存のコンテンツをインプットに置き換え
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'edit-input';
            input.value = todo.text;
            input.maxLength = 100;

            // アクションボタンを非表示にする
            const actionBtns = itemEl.querySelector('.action-buttons');
            actionBtns.style.display = 'none';

            // チェックボックスを一時無効化
            const checkbox = itemEl.querySelector('.todo-checkbox');
            checkbox.disabled = true;

            contentEl.innerHTML = '';
            contentEl.appendChild(input);
            input.focus();

            // 編集完了処理関数
            const finishEdit = () => {
                const newText = input.value.trim();
                if (newText && newText !== todo.text) {
                    todo.text = newText;
                    saveTodos();
                }
                render(); // 再描画して状態を確定させる
            };

            // エンターキーで確定、エスケープでキャンセル
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    finishEdit();
                } else if (e.key === 'Escape') {
                    render();
                }
            });

            // フォーカスが外れたら確定
            input.addEventListener('blur', finishEdit);
        }

        // タスク削除
        function deleteTodo(id) {
            // フェードアウトさせてから削除（アニメーション効果）
            const itemEl = document.getElementById(`todo-${id}`);
            if (itemEl) {
                itemEl.style.opacity = '0';
                itemEl.style.transform = 'translateY(10px)';
                itemEl.style.transition = 'all 0.25s ease';
                
                setTimeout(() => {
                    todos = todos.filter(todo => todo.id !== id);
                    saveTodos();
                    render();
                }, 250);
            } else {
                todos = todos.filter(todo => todo.id !== id);
                saveTodos();
                render();
            }
        }

        // --- レンダリング（画面描画） ---
        function render() {
            // 1. 統計情報の更新
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;

            totalCountEl.textContent = total;
            completedCountEl.textContent = completed;

            // 2. フィルター適用の配列作成
            let filteredTodos = todos;
            if (currentFilter === 'active') {
                filteredTodos = todos.filter(todo => !todo.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(todo => todo.completed);
            }

            // 3. 一覧の生成
            todoList.innerHTML = '';

            if (filteredTodos.length === 0) {
                todoList.style.display = 'none';
                emptyState.style.display = 'block';

                // 空状態の文言をフィルターに合わせて変更
                if (currentFilter === 'active') {
                    emptyText.textContent = '未完了のタスクはありません';
                } else if (currentFilter === 'completed') {
                    emptyText.textContent = '完了したタスクはありません';
                } else {
                    emptyText.textContent = 'タスクは登録されていません';
                }
            } else {
                todoList.style.display = 'flex';
                emptyState.style.display = 'none';

                filteredTodos.forEach(todo => {
                    const li = document.createElement('li');
                    li.id = `todo-${todo.id}`;
                    li.className = `todo-item ${todo.completed ? 'completed' : ''}`;

                    // HTML構造の作成
                    li.innerHTML = `
                        <label class="checkbox-wrapper" title="${todo.completed ? '未完了にする' : '完了にする'}">
                            <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}>
                            <span class="checkmark"></span>
                        </label>
                        <span class="todo-content">${escapeHTML(todo.text)}</span>
                        <div class="action-buttons">
                            <button class="action-btn edit-btn" title="タスクを編集" aria-label="編集">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button class="action-btn delete-btn" title="タスクを削除" aria-label="削除">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    `;

                    // イベントハンドラーのアタッチ
                    const checkbox = li.querySelector('.todo-checkbox');
                    checkbox.addEventListener('change', () => toggleTodo(todo.id));

                    const content = li.querySelector('.todo-content');
                    
                    // ダブルクリック、または編集ボタンで編集開始
                    const editBtn = li.querySelector('.edit-btn');
                    const triggerEdit = () => {
                        // 完了状態のタスクは編集不可
                        if (!todo.completed) {
                            startEdit(todo.id, content, li);
                        }
                    };
                    editBtn.addEventListener('click', triggerEdit);
                    content.addEventListener('dblclick', triggerEdit);

                    // 削除ボタン
                    const deleteBtn = li.querySelector('.delete-btn');
                    deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

                    // 完了したタスクの編集ボタンはグレーアウト＆無効
                    if (todo.completed) {
                        editBtn.style.opacity = '0.3';
                        editBtn.style.cursor = 'not-allowed';
                        editBtn.title = '完了したタスクは編集できません';
                    }

                    todoList.appendChild(li);
                });
            }
        }

        // セキュリティ対策：エスケープ関数
        function escapeHTML(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
